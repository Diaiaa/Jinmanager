<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>디아4 진매니저 오픈채팅</title>
    <!-- Tailwind CSS 로드 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 폰트어썸 (아이콘용) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* 기본 폰트 설정 및 부드러운 스크롤 */
        body {
            font-family: 'Noto Sans KR', sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            background-color: #111827; /* 어두운 배경색 (디아블로 테마) */
            color: #e5e7eb; /* 기본 텍스트 색상 */
        }

        /* 메인 상단 영역의 그라데이션 및 블러 효과 */
        .hero-section {
            background: linear-gradient(to bottom, rgba(55, 178, 117, 0.2), #111827), url('https://placehold.co/1920x1080/1a202c/37b275?text=Diablo+IV+Vibe') no-repeat center center/cover;
            position: relative;
        }
        
        .hero-section::before {
             content: '';
             position: absolute;
             top: 0;
             left: 0;
             right: 0;
             bottom: 0;
             background-color: rgba(17, 24, 39, 0.7); /* 어두운 오버레이 */
             z-index: 0;
        }
        
        .hero-content {
            position: relative;
            z-index: 1;
        }

        /* 버튼 호버 효과 트랜지션 (게임 스타일) */
        .btn-hover-effect {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            background: linear-gradient(135deg, #37b275 0%, #258c5c 100%);
            border: 2px solid transparent;
        }

        .btn-hover-effect:hover {
            transform: translateY(-2px) scale(1.05);
            box-shadow: 0 10px 25px -5px rgba(55, 178, 117, 0.5), 0 8px 10px -6px rgba(55, 178, 117, 0.3);
            border-color: #4ade80;
        }

        /* 하단 메뉴 카드 스타일 */
        .action-card {
            background: rgba(31, 41, 55, 0.5); /* 반투명 카드 배경 */
            backdrop-filter: blur(10px);
            border: 1px solid rgba(75, 85, 99, 0.4);
            transition: all 0.3s ease;
            border-radius: 1rem;
        }
        
        .action-card:hover {
            background: rgba(31, 41, 55, 0.8);
            border-color: #37b275;
            transform: translateY(-5px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
        }

        .action-card:hover .icon-container {
            color: #4ade80;
            transform: scale(1.1) rotate(5deg);
        }
        
        .icon-container {
            transition: all 0.3s ease;
            color: #9ca3af; /* 기본 아이콘 색상 */
        }
        
        /* 텍스트 글로우 효과 */
        .text-glow {
            text-shadow: 0 0 10px rgba(55, 178, 117, 0.5);
        }

        /* 둥둥 떠다니는 텍스트 애니메이션 */
        @keyframes float-up-down {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-8px); /* 위로 8px 이동 */
            }
        }

        .floating-text {
            animation: float-up-down 4s ease-in-out infinite; /* 4초 주기로 무한 반복 */
            display: inline-block; /* transform 적용을 위해 필요 */
        }
    </style>
    <!-- 구글 폰트 (Noto Sans KR) -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
</head>
<body class="min-h-screen flex flex-col">

    <!-- 상단 게임 테마 영역 -->
    <main class="hero-section text-white py-32 px-4 sm:px-6 lg:px-8 flex-grow-0 flex flex-col items-center justify-center text-center shadow-2xl">
        
        <!-- 콘텐츠 래퍼 -->
        <div class="hero-content flex flex-col items-center w-full max-w-2xl mx-auto">
            
            <!-- 로고 및 서비스 명 -->
            <div class="mb-8 flex items-center justify-center space-x-3 bg-black/30 px-6 py-2 rounded-full border border-gray-700/50 backdrop-blur-sm floating-text">
                <i class="fa-solid fa-comment text-green-400 text-xl"></i>
                <span class="text-lg font-medium tracking-widest text-gray-300">KAKAO<span class="font-light opacity-75">OPENCHAT</span></span>
            </div>

            <!-- 메인 타이틀 (디아블로 테마 강조) -->
            <h1 class="text-5xl sm:text-6xl md:text-7xl font-black mb-6 tracking-tighter text-transparent bg-clip-text bg-gradient-to-r from-gray-100 to-gray-500 drop-shadow-lg">
                디아4 진매니저
            </h1>
            
            <p class="text-xl sm:text-2xl font-light mb-12 text-green-400 tracking-wide text-glow">
                1:1 맞춤 상담 및 세팅
            </p>

            <!-- 메인 액션 버튼 -->
            <button id="joinButton" class="btn-hover-effect text-white font-bold py-4 px-10 rounded-full text-xl flex items-center space-x-3 group w-full sm:w-auto justify-center">
                <i class="fa-brands fa-kickstarter-k text-2xl"></i>
                <span>오픈채팅 입장하기</span>
                <i class="fa-solid fa-chevron-right text-sm opacity-70 group-hover:opacity-100 group-hover:translate-x-1 transition-transform"></i>
            </button>
            
            <p class="mt-6 text-sm text-gray-500">클릭 시 카카오톡 앱으로 자동 연결됩니다.</p>

            <!-- 라이브 현황 및 조회수 배너 -->
            <div class="mt-8 bg-gray-900/60 backdrop-blur-md border border-gray-700/50 rounded-full py-3 px-6 w-full max-w-lg flex flex-wrap items-center justify-center gap-x-4 gap-y-2 text-sm shadow-xl transition-all">
                <!-- LIVE 뱃지 및 상담중 -->
                <div class="flex items-center space-x-2">
                    <span class="bg-red-500/10 text-red-400 border border-red-500/30 px-2.5 py-0.5 rounded-full text-xs font-bold flex items-center shadow-[0_0_8px_rgba(239,68,68,0.2)]">
                        <span class="w-1.5 h-1.5 bg-red-500 rounded-full mr-1.5 animate-pulse"></span>LIVE
                    </span>
                    <span class="text-gray-300">현재 상담중 <strong id="liveCount" class="text-white text-base mx-0.5 transition-colors duration-300">0</strong> 명</span>
                </div>
                
                <span class="text-gray-600 hidden sm:inline">|</span>
                
                <!-- 오늘 조회 -->
                <div class="flex items-center">
                    <span class="text-gray-300">오늘 조회 <strong id="todayViews" class="text-white text-base mx-0.5">0</strong> 회</span>
                </div>

                <span class="text-gray-600 hidden sm:inline">|</span>

                <!-- 누적 조회 -->
                <div class="flex items-center">
                    <span class="text-gray-300">누적 조회수 <strong id="totalViews" class="text-white text-base mx-0.5">0</strong> 회</span>
                </div>
            </div>
        </div>
    </main>

    <!-- 하단 다크 모드 안내 영역 -->
    <section class="bg-[#111827] flex-grow pt-16 pb-24 px-4 sm:px-6 lg:px-8 relative z-10">
        <div class="max-w-5xl mx-auto">
            
            <!-- 구분선 및 안내 문구 -->
            <div class="flex items-center justify-center mb-12">
                <div class="w-16 h-px bg-gray-700"></div>
                <p class="text-center text-gray-400 text-sm md:text-base mx-4 font-medium uppercase tracking-widest">
                    연결 문제 발생 시 해결 방법
                </p>
                <div class="w-16 h-px bg-gray-700"></div>
            </div>

            <!-- 4가지 액션 메뉴 그리드 (카드 스타일) -->
            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6 text-center">
                
                <!-- 1. 링크 복사하기 -->
                <div class="action-card p-6 cursor-pointer flex flex-col items-center justify-center min-h-[160px]" onclick="copyLink()">
                    <div class="icon-container text-4xl mb-4">
                        <i class="fa-solid fa-link"></i>
                    </div>
                    <h3 class="text-gray-200 text-base font-semibold">링크 복사</h3>
                    <p class="text-gray-500 text-xs mt-2">브라우저에 직접 붙여넣기</p>
                </div>

                <!-- 2. 모바일로 링크받기 -->
                <div class="action-card p-6 cursor-pointer flex flex-col items-center justify-center min-h-[160px]" onclick="showNotification('모바일 카카오톡으로 링크를 전송했습니다. (가상 기능)')">
                    <div class="icon-container text-4xl mb-4 relative">
                        <i class="fa-regular fa-comment-dots"></i>
                        <i class="fa-solid fa-mobile-screen absolute text-sm -bottom-1 -right-2 text-[#111827] bg-gray-400 rounded-sm px-0.5"></i>
                    </div>
                    <h3 class="text-gray-200 text-base font-semibold">모바일 전송</h3>
                    <p class="text-gray-500 text-xs mt-2">내 폰으로 링크 보내기</p>
                </div>

                <!-- 3. QR 코드 스캔 -->
                <div class="action-card p-6 cursor-pointer flex flex-col items-center justify-center min-h-[160px]" onclick="showQRCode()">
                    <div class="icon-container text-4xl mb-4">
                        <i class="fa-solid fa-qrcode"></i>
                    </div>
                    <h3 class="text-gray-200 text-base font-semibold">QR 스캔</h3>
                    <p class="text-gray-500 text-xs mt-2">스마트폰 카메라로 스캔</p>
                </div>

                <!-- 4. PC버전 설치 확인 -->
                <div class="action-card p-6 cursor-pointer flex flex-col items-center justify-center min-h-[160px]" onclick="window.open('https://www.kakaocorp.com/page/service/service/KakaoTalk', '_blank')">
                    <div class="icon-container text-4xl mb-4">
                        <i class="fa-solid fa-desktop"></i>
                    </div>
                    <h3 class="text-gray-200 text-base font-semibold">PC 카톡 설치</h3>
                    <p class="text-gray-500 text-xs mt-2">PC버전 다운로드 페이지</p>
                </div>

            </div>
        </div>
    </section>

    <!-- 알림 메시지 토스트 (사이버펑크 느낌) -->
    <div id="toast" class="fixed bottom-8 left-1/2 transform -translate-x-1/2 bg-gray-800 border border-green-500/50 text-green-400 px-8 py-4 rounded-lg shadow-[0_0_15px_rgba(55,178,117,0.3)] opacity-0 transition-opacity duration-300 pointer-events-none z-50 font-medium tracking-wide flex items-center space-x-3">
        <i class="fa-solid fa-circle-check"></i>
        <span id="toastMessage">메시지 내용</span>
    </div>

    <!-- QR 코드 모달 (다크 테마) -->
    <div id="qrModal" class="fixed inset-0 bg-black/80 backdrop-blur-sm flex items-center justify-center z-50 opacity-0 pointer-events-none transition-all duration-300">
        <div class="bg-gray-900 border border-gray-700 p-8 rounded-2xl shadow-2xl max-w-sm w-full mx-4 transform scale-95 transition-transform duration-300" id="qrModalContent">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-bold text-gray-100 flex items-center gap-2">
                    <i class="fa-solid fa-qrcode text-green-500"></i> QR 코드 스캔
                </h2>
                <button onclick="closeQRCode()" class="text-gray-500 hover:text-white transition-colors focus:outline-none bg-gray-800 rounded-full w-8 h-8 flex items-center justify-center">
                    <i class="fa-solid fa-times"></i>
                </button>
            </div>
            <div class="flex flex-col items-center">
                <!-- 가짜 QR 코드 이미지 영역 (흰색 배경 유지하여 스캔 잘 되게) -->
                <div class="w-56 h-56 bg-white flex items-center justify-center rounded-xl mb-6 shadow-inner p-4">
                    <!-- 오픈채팅 링크 기반 QR 이미지 생성 -->
                    <img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=https://open.kakao.com/o/sNUOWLui" alt="QR Code" class="w-full h-full object-contain opacity-80" onerror="this.outerHTML='<i class=\'fa-solid fa-qrcode text-6xl text-gray-800\'></i>'">
                </div>
                <div class="bg-gray-800 rounded-lg p-4 w-full text-center border border-gray-700">
                    <p class="text-sm text-gray-300 leading-relaxed">
                        기본 카메라 앱 또는<br>카카오톡 <b>[더보기] > [결제] > [QR스캔]</b>을<br>이용해 주세요.
                    </p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 실제 채팅방 링크
        const chatLink = "https://open.kakao.com/o/sNUOWLui";

        // 오디오 객체 미리 로드 (같은 폴더에 있는 파일 이름으로 지정)
        const entryAudio = new Audio('./clova-entry.mp3.mp3');

        // 메인 참여 버튼 클릭 이벤트
        document.getElementById('joinButton').addEventListener('click', function() {
            showNotification('카카오톡으로 이동 중입니다...');
            
            // 직접 올려주신 mp3 오디오 재생
            entryAudio.currentTime = 0; // 연속 클릭 시 처음부터 다시 재생되도록
            entryAudio.play().catch(e => console.log("오디오 재생 실패:", e));

            // 새 창에서 카카오톡 링크 열기 (음성이 끝까지 나오도록 지연 시간 1.5초로 증가)
            setTimeout(() => { window.open(chatLink, '_blank'); }, 1500);
        });

        // 링크 복사 기능
        function copyLink() {
            if (navigator.clipboard && window.isSecureContext) {
                // navigator.clipboard API 사용 (최신 브라우저)
                navigator.clipboard.writeText(chatLink).then(() => {
                    showNotification("링크가 클립보드에 복사되었습니다.");
                }).catch(err => {
                    fallbackCopyTextToClipboard(chatLink);
                });
            } else {
                fallbackCopyTextToClipboard(chatLink);
            }
        }
        
        function fallbackCopyTextToClipboard(text) {
            const tempInput = document.createElement("input");
            tempInput.value = text;
            document.body.appendChild(tempInput);
            tempInput.select();
            
            try {
                document.execCommand("copy");
                showNotification("링크가 클립보드에 복사되었습니다.");
            } catch (err) {
                showNotification("링크 복사에 실패했습니다.");
            } finally {
                document.body.removeChild(tempInput);
            }
        }

        // 토스트 알림 표시 함수
        let toastTimeout;
        function showNotification(message) {
            const toast = document.getElementById('toast');
            const toastMsg = document.getElementById('toastMessage');
            
            toastMsg.textContent = message;
            toast.classList.remove('opacity-0', 'pointer-events-none');
            toast.classList.add('opacity-100');
            
            clearTimeout(toastTimeout);
            toastTimeout = setTimeout(() => {
                toast.classList.remove('opacity-100');
                toast.classList.add('opacity-0', 'pointer-events-none');
            }, 3000);
        }

        // QR 코드 모달 열기
        function showQRCode() {
            const modal = document.getElementById('qrModal');
            const modalContent = document.getElementById('qrModalContent');
            
            modal.classList.remove('opacity-0', 'pointer-events-none');
            // 부드러운 스케일 업 애니메이션
            setTimeout(() => {
                modalContent.classList.remove('scale-95');
                modalContent.classList.add('scale-100');
            }, 10);
        }

        // QR 코드 모달 닫기
        function closeQRCode() {
            const modal = document.getElementById('qrModal');
            const modalContent = document.getElementById('qrModalContent');
            
            modalContent.classList.remove('scale-100');
            modalContent.classList.add('scale-95');
            
            setTimeout(() => {
                modal.classList.add('opacity-0', 'pointer-events-none');
            }, 300);
        }

        // 모달 바깥 영역 클릭 시 닫기
        document.getElementById('qrModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeQRCode();
            }
        });

        // ==========================================
        // 1. 현재 상담중 (1~6명) 15초 랜덤 유지 로직
        // ==========================================
        function updateLiveConsultationCount() {
            // 새로고침해도 15초 동안은 동일한 값이 나오도록 시간을 15000ms 단위로 나눈 청크(Chunk) 사용
            const timeChunk = Math.floor(Date.now() / 15000);
            
            // 청크 값을 이용해 난수 생성 (항상 같은 시간대에는 같은 값 도출)
            const x = Math.sin(timeChunk) * 10000;
            const count = Math.floor((x - Math.floor(x)) * 6) + 1; // 1~6명
            
            const countElement = document.getElementById('liveCount');
            if (countElement.textContent !== count.toString()) {
                countElement.textContent = count;
                // 값이 바뀔 때 텍스트 색상 깜빡임 효과
                countElement.classList.add('text-green-400');
                setTimeout(() => countElement.classList.remove('text-green-400'), 500);
            }
        }
        updateLiveConsultationCount(); // 로드 시 즉시 실행
        setInterval(updateLiveConsultationCount, 1000); // 1초마다 확인하지만 실제 변경은 15초 주기로 발생
    </script>

    <!-- ==========================================
         2. 파이어베이스 조회수 연결 로직
         ========================================== -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // 파이어베이스 설정 (미리보기 환경 & 실제 호스팅 환경 자동 분기)
        let firebaseConfig;
        let isPreviewEnv = false;
        
        if (typeof __firebase_config !== 'undefined') {
            // 현재 우측 미리보기(Canvas) 환경인 경우 자동으로 로드
            firebaseConfig = JSON.parse(__firebase_config);
            isPreviewEnv = true;
        } else {
            // ⚠️ 실제 사용자님의 사이트에 코드를 올리실 때는 
            // 이 부분을 jinn-c154f 프로젝트 설정값으로 채워주세요!
            firebaseConfig = {
                // apiKey: "사용자님의_API_KEY",
                // authDomain: "jinn-c154f.firebaseapp.com",
                // projectId: "jinn-c154f",
                // storageBucket: "jinn-c154f.appspot.com",
                // ...
            };
        }

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Firestore 경로 설정
        let statsRef;
        if (isPreviewEnv) {
            // 미리보기 환경 규칙 적용 (안전한 테스트용)
            const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';
            statsRef = doc(db, 'artifacts', appId, 'public', 'data', 'gameshop_public_stats', 'view_stats');
        } else {
            // 캡처본에 있던 실제 사용자님의 DB 규칙 경로
            statsRef = doc(db, 'gameshop_public_stats', 'view_stats');
        }

        // 한국 시간(KST) 기준 날짜(YYYY-MM-DD) 가져오기
        const getKSTDateStr = () => {
            const now = new Date();
            const utc = now.getTime() + (now.getTimezoneOffset() * 60000);
            const kstTime = new Date(utc + (9 * 3600000)); // +9시간
            return kstTime.toISOString().split('T')[0];
        };

        const processViews = async (user) => {
            if (!user) return;
            const dateStr = getKSTDateStr();
            
            try {
                const docSnap = await getDoc(statsRef);
                let todayViews = 0;
                let totalViews = 0;

                if (docSnap.exists()) {
                    const data = docSnap.data();
                    totalViews = data.totalViews || 0;
                    
                    if (data.lastDate === dateStr) {
                        todayViews = data.todayViews || 0;
                    } else {
                        todayViews = 0; // 날짜가 다르면 오늘 조회수 0으로 리셋
                    }
                }

                // 새로고침 시 조회수 무한 증가 방지 (세션 스토리지 활용 - 창 닫을때까지 1번만)
                if (!sessionStorage.getItem('has_viewed_today')) {
                    totalViews++;
                    todayViews++;
                    await setDoc(statsRef, {
                        totalViews: totalViews,
                        todayViews: todayViews,
                        lastDate: dateStr
                    }, { merge: true });
                    sessionStorage.setItem('has_viewed_today', 'true');
                }

                // 화면에 조회수 텍스트 업데이트
                document.getElementById('todayViews').textContent = todayViews.toLocaleString();
                document.getElementById('totalViews').textContent = totalViews.toLocaleString();

            } catch(error) {
                console.error("Firebase 연동 오류:", error);
            }
        };

        // Firebase Auth 초기화
        const initAuth = async () => {
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                await signInWithCustomToken(auth, __initial_auth_token);
            } else {
                await signInAnonymously(auth);
            }
        };
        
        initAuth();
        onAuthStateChanged(auth, (user) => {
            if (user) {
                processViews(user);
            }
        });
    </script>
</body>
</html>
