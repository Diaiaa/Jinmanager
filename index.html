<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>진매니저 1:1 거래방</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      (function () {
        var w = window;
        if (w.ChannelIO) return;
        var ch = function () {
          ch.c(arguments);
        };
        ch.q = [];
        ch.c = function (args) {
          ch.q.push(args);
        };
        w.ChannelIO = ch;
        function loadScript() {
          if (w.ChannelIOInitialized) return;
          w.ChannelIOInitialized = true;
          var s = document.createElement("script");
          s.type = "text/javascript";
          s.async = true;
          s.src = "https://cdn.channel.io/plugin/ch-plugin-web.js";
          var x = document.getElementsByTagName("script")[0];
          if (x && x.parentNode) x.parentNode.insertBefore(s, x);
          else document.head.appendChild(s);
        }
        if (document.readyState === "complete") loadScript();
        else window.addEventListener("DOMContentLoaded", loadScript);
        window.addEventListener("load", loadScript);
      })();
      ChannelIO("boot", { pluginKey: "bc2809e8-2542-4534-bd25-94d9dc9c20fd" });
      ChannelIO("hideChannelButton");
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
