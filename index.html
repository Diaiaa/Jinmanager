<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>디아4 진매니저 1:1 오픈채팅</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @keyframes float-up-down {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }
        .floating-text {
            display: inline-block;
            animation: float-up-down 4s ease-in-out infinite;
        }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 font-sans min-h-screen flex flex-col items-center selection:bg-green-500/30">

    <div id="toast" class="fixed top-5 left-1/2 transform -translate-x-1/2 bg-gray-800 border border-green-500/50 text-green-400 px-6 py-3 rounded-full shadow-[0_0_15px_rgba(34,197,94,0.2)] opacity-0 transition-opacity duration-300 z-50 pointer-events-none flex items-center space-x-2 font-medium">
        <i class="fa-solid fa-circle-check"></i>
        <span id="toastMessage"></span>
    </div>

    <main class="w-full max-w-4xl px-4 pt-20 pb-16 flex flex-col items-center text-center relative flex-grow z-10">
        
        <div class="floating-text mb-8">
            <div class="bg-gray-800/80 backdrop-blur-sm border border-gray-700 text-gray-300 text-xs font-bold tracking-widest py-1.5 px-4 rounded-full flex items-center shadow-lg">
                <i class="fa-solid fa-comment text-green-400 mr-2"></i>
                KAKAO OPENCHAT
            </div>
        </div>

        <h1 class="text-4xl md:text-5xl font-extrabold mb-4 tracking-tight bg-gradient-to-r from-white to-gray-400 bg-clip-text text-transparent drop-shadow-[0_0_10px_rgba(255,255,255,0.1)]">
            디아4 진매니저
        </h1>
        <p class="text-lg md:text-xl text-green-400 font-medium mb-12 tracking-wide drop-shadow-[0_0_8px_rgba(74,222,128,0.2)]">
            1:1 맞춤 상담 및 세팅
        </p>

        <div class="relative w-full max-w-md mx-auto group">
            <div class="absolute -inset-1 bg-gradient-to-r from-green-500 to-emerald-600 rounded-full blur opacity-25 group-hover:opacity-50 transition duration-1000 group-hover:duration-200"></div>
            <button id="joinButton" class="relative w-full bg-gradient-to-r from-green-500 to-emerald-600 hover:from-green-400 hover:to-emerald-500 text-white font-bold text-lg py-4 px-8 rounded-full shadow-lg transform transition-all active:scale-95 flex items-center justify-center space-x-3">
                <i class="fa-solid fa-k"></i>
                <span>오픈채팅 입장하기</span>
                <i class="fa-solid fa-chevron-right text-sm opacity-70 group-hover:opacity-100 group-hover:translate-x-1 transition-transform"></i>
            </button>
            
            <p class="mt-6 text-sm text-gray-500">클릭 시 카카오톡 앱으로 자동 연결됩니다.</p>

            <div class="mt-8 bg-gray-900/60 backdrop-blur-md border border-gray-700/50 rounded-full py-3 px-6 w-full max-w-lg flex flex-wrap items-center justify-center gap-x-4 gap-y-2 text-sm shadow-xl transition-all">
                <div class="flex items-center space-x-2">
                    <span class="bg-red-500/10 text-red-400 border border-red-500/30 px-2.5 py-0.5 rounded-full text-xs font-bold flex items-center shadow-[0_0_8px_rgba(239,68,68,0.2)]">
                        <span class="w-1.5 h-1.5 bg-red-500 rounded-full mr-1.5 animate-pulse"></span>LIVE
                    </span>
                    <span class="text-gray-300">현재 상담중 <strong id="liveCount" class="text-white text-base mx-0.5 transition-colors duration-300">0</strong> 명</span>
                </div>
                
                <span class="text-gray-600 hidden sm:inline">|</span>
                
                <div class="flex items-center">
                    <span class="text-gray-300">오늘 조회 <strong id="todayViews" class="text-white text-base mx-0.5">0</strong> 회</span>
                </div>

                <span class="text-gray-600 hidden sm:inline">|</span>

                <div class="flex items-center">
                    <span class="text-gray-300">누적 조회수 <strong id="totalViews" class="text-white text-base mx-0.5">0</strong> 회</span>
                </div>
            </div>
        </div>
    </main>

    <div class="w-full max-w-3xl mx-auto flex items-center mb-10 px-6 opacity-60">
        <div class="flex-grow border-t border-gray-700"></div>
        <span class="flex-shrink-0 mx-4 text-gray-400 text-sm font-medium tracking-wider">연결 문제 발생 시 해결 방법</span>
        <div class="flex-grow border-t border-gray-700"></div>
    </div>

    <div class="w-full max-w-5xl px-6 pb-20 grid grid-cols-1 md:grid-cols-3 gap-6">
        
        <button onclick="copyLink()" class="group relative bg-gray-800/50 hover:bg-gray-800 backdrop-blur-md border border-gray-700 p-6 rounded-2xl transition-all duration-300 hover:-translate-y-1 hover:shadow-[0_10px_20px_rgba(0,0,0,0.3)]">
            <div class="flex flex-col items-center text-center">
                <div class="w-14 h-14 mb-4 rounded-full bg-gray-700/50 flex items-center justify-center text-2xl text-gray-300 group-hover:text-green-400 group-hover:scale-110 transition-all">
                    <i class="fa-solid fa-link"></i>
                </div>
                <h3 class="text-gray-100 font-bold mb-2">링크 복사</h3>
                <p class="text-sm text-gray-400">브라우저에 직접 붙여넣기</p>
            </div>
        </button>

        <button onclick="showQRCode()" class="group relative bg-gray-800/50 hover:bg-gray-800 backdrop-blur-md border border-gray-700 p-6 rounded-2xl transition-all duration-300 hover:-translate-y-1 hover:shadow-[0_10px_20px_rgba(0,0,0,0.3)]">
            <div class="flex flex-col items-center text-center">
                <div class="w-14 h-14 mb-4 rounded-full bg-gray-700/50 flex items-center justify-center text-2xl text-gray-300 group-hover:text-green-400 group-hover:scale-110 transition-all">
                    <i class="fa-solid fa-qrcode"></i>
                </div>
                <h3 class="text-gray-100 font-bold mb-2">QR 스캔</h3>
                <p class="text-sm text-gray-400">스마트폰 카메라로 스캔</p>
            </div>
        </button>

        <button onclick="window.open('https://www.kakaocorp.com/page/service/service/KakaoTalk', '_blank')" class="group relative bg-gray-800/50 hover:bg-gray-800 backdrop-blur-md border border-gray-700 p-6 rounded-2xl transition-all duration-300 hover:-translate-y-1 hover:shadow-[0_10px_20px_rgba(0,0,0,0.3)]">
            <div class="flex flex-col items-center text-center">
                <div class="w-14 h-14 mb-4 rounded-full bg-gray-700/50 flex items-center justify-center text-2xl text-gray-300 group-hover:text-green-400 group-hover:scale-110 transition-all">
                    <i class="fa-solid fa-desktop"></i>
                </div>
                <h3 class="text-gray-100 font-bold mb-2">PC 카톡 설치</h3>
                <p class="text-sm text-gray-400">PC버전 다운로드 페이지</p>
            </div>
        </button>
    </div>

    <div id="qrModal" class="fixed inset-0 bg-black/80 backdrop-blur-sm z-50 flex items-center justify-center opacity-0 pointer-events-none transition-opacity duration-300">
        <div class="bg-gray-900 border border-gray-700 rounded-3xl p-8 max-w-sm w-full mx-4 shadow-2xl transform scale-95 transition-transform duration-300" id="qrModalContent">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-bold text-gray-100">QR 코드로 입장</h2>
                <button onclick="closeQRCode()" class="text-gray-400 hover:text-white transition-colors">
                    <i class="fa-solid fa-xmark text-2xl"></i>
                </button>
            </div>
            <div class="flex flex-col items-center space-y-6">
                <div class="bg-white p-4 rounded-2xl shadow-inner">
                    <img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=https://open.kakao.com/o/sNUOWLui" alt="QR Code" class="w-48 h-48 rounded-lg">
                </div>
                <div class="bg-gray-800 rounded-lg p-4 w-full text-center border border-gray-700">
                    <p class="text-sm text-gray-300 leading-relaxed">
                        기본 카메라 앱 또는<br>카카오톡 <b>[더보기] > [결제] > [QR스캔]</b>을<br>이용해 주세요.
                    </p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 실제 채팅방 링크
        const chatLink = "https://open.kakao.com/o/sNUOWLui";

        // 오디오 객체 미리 로드 (같은 폴더에 있는 파일 이름으로 지정)
        const entryAudio = new Audio('./clova-entry.mp3.mp3');

        // 메인 참여 버튼 클릭 이벤트
        document.getElementById('joinButton').addEventListener('click', function() {
            showNotification('카카오톡으로 이동 중입니다...');
            
            // 직접 올려주신 mp3 오디오 재생
            entryAudio.currentTime = 0; // 연속 클릭 시 처음부터 다시 재생되도록
            entryAudio.play().catch(e => console.log("오디오 재생 실패:", e));

            // 새 창에서 카카오톡 링크 열기 (음성이 끝까지 나오도록 지연 시간 1.5초로 증가)
            setTimeout(() => { window.open(chatLink, '_blank'); }, 1500);
        });

        // 링크 복사 기능
        function copyLink() {
            if (navigator.clipboard && window.isSecureContext) {
                navigator.clipboard.writeText(chatLink).then(() => {
                    showNotification('링크가 복사되었습니다!');
                }).catch(err => {
                    console.error('Failed to copy: ', err);
                });
            } else {
                // 폴백 (구형 브라우저 등)
                const textArea = document.createElement("textarea");
                textArea.value = chatLink;
                textArea.style.position = "absolute";
                textArea.style.left = "-999999px";
                document.body.prepend(textArea);
                textArea.select();
                try {
                    document.execCommand('copy');
                    showNotification('링크가 복사되었습니다!');
                } catch (error) {
                    console.error(error);
                } finally {
                    textArea.remove();
                }
            }
        }

        // 토스트 알림 표시
        function showNotification(message) {
            const toast = document.getElementById('toast');
            document.getElementById('toastMessage').innerText = message;
            toast.classList.remove('opacity-0');
            
            setTimeout(() => {
                toast.classList.add('opacity-0');
            }, 3000);
        }

        // QR 모달 열기
        function showQRCode() {
            const modal = document.getElementById('qrModal');
            const content = document.getElementById('qrModalContent');
            modal.classList.remove('opacity-0', 'pointer-events-none');
            content.classList.remove('scale-95');
            content.classList.add('scale-100');
        }

        // QR 모달 닫기
        function closeQRCode() {
            const modal = document.getElementById('qrModal');
            const content = document.getElementById('qrModalContent');
            content.classList.remove('scale-100');
            content.classList.add('scale-95');
            modal.classList.add('opacity-0');
            setTimeout(() => {
                modal.classList.add('pointer-events-none');
            }, 300);
        }

        // 모달 바깥 영역 클릭 시 닫기
        document.getElementById('qrModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeQRCode();
            }
        });

        // ==========================================
        // 1. 현재 상담중 (1~6명) 15초 랜덤 유지 로직
        // ==========================================
        function updateLiveConsultationCount() {
            // 새로고침해도 15초 동안은 동일한 값이 나오도록 시간을 15000ms 단위로 나눈 청크(Chunk) 사용
            const timeChunk = Math.floor(Date.now() / 15000);
            
            // 청크 값을 이용해 난수 생성 (항상 같은 시간대에는 같은 값 도출)
            const x = Math.sin(timeChunk) * 10000;
            const count = Math.floor((x - Math.floor(x)) * 6) + 1; // 1~6명
            
            const countElement = document.getElementById('liveCount');
            if (countElement.textContent !== count.toString()) {
                countElement.textContent = count;
                // 값이 바뀔 때 텍스트 색상 깜빡임 효과
                countElement.classList.add('text-green-400');
                setTimeout(() => countElement.classList.remove('text-green-400'), 500);
            }
        }
        updateLiveConsultationCount(); // 로드 시 즉시 실행
        setInterval(updateLiveConsultationCount, 1000); // 1초마다 확인하지만 실제 변경은 15초 주기로 발생
    </script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // 파이어베이스 설정 (미리보기 환경 & 실제 호스팅 환경 자동 분기)
        let firebaseConfig;
        let isPreviewEnv = false;
        
        if (typeof __firebase_config !== 'undefined') {
            // 현재 우측 미리보기(Canvas) 환경인 경우 자동으로 로드
            firebaseConfig = JSON.parse(__firebase_config);
            isPreviewEnv = true;
        } else {
            // ⚠️ 실제 사용자님의 사이트에 코드를 올리실 때는 
            // 이 부분을 jinn-c154f 프로젝트 설정값으로 채워주세요!
            firebaseConfig = {
                // apiKey: "사용자님의_API_KEY",
                // authDomain: "jinn-c154f.firebaseapp.com",
                // projectId: "jinn-c154f",
                // storageBucket: "jinn-c154f.appspot.com",
                // ...
            };
        }

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Firestore 경로 설정
        let statsRef;
        if (isPreviewEnv) {
            // 미리보기 환경 규칙 적용 (안전한 테스트용)
            const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';
            statsRef = doc(db, 'artifacts', appId, 'public', 'data', 'gameshop_public_stats', 'view_stats');
        } else {
            // 캡처본에 있던 실제 사용자님의 DB 규칙 경로
            statsRef = doc(db, 'gameshop_public_stats', 'view_stats');
        }

        // 한국 시간(KST) 기준 날짜(YYYY-MM-DD) 가져오기
        const getKSTDateStr = () => {
            const now = new Date();
            const utc = now.getTime() + (now.getTimezoneOffset() * 60000);
            const kstTime = new Date(utc + (9 * 3600000)); // +9시간
            return kstTime.toISOString().split('T')[0];
        };

        const processViews = async (user) => {
            if (!user) return;
            const dateStr = getKSTDateStr();
            
            try {
                const docSnap = await getDoc(statsRef);
                let todayViews = 0;
                let totalViews = 0;

                if (docSnap.exists()) {
                    const data = docSnap.data();
                    totalViews = data.totalViews || 0;
                    
                    if (data.lastDate === dateStr) {
                        todayViews = data.todayViews || 0;
                    } else {
                        todayViews = 0; // 날짜가 다르면 오늘 조회수 0으로 리셋
                    }
                }

                // 새로고침 시 조회수 무한 증가 방지 (세션 스토리지 활용 - 창 닫을때까지 1번만)
                if (!sessionStorage.getItem('has_viewed_today')) {
                    totalViews++;
                    todayViews++;
                    await setDoc(statsRef, {
                        totalViews: totalViews,
                        todayViews: todayViews,
                        lastDate: dateStr
                    }, { merge: true });
                    sessionStorage.setItem('has_viewed_today', 'true');
                }

                // 화면에 조회수 텍스트 업데이트
                document.getElementById('todayViews').textContent = todayViews.toLocaleString();
                document.getElementById('totalViews').textContent = totalViews.toLocaleString();

            } catch(error) {
                console.error("Firebase 연동 오류:", error);
            }
        };

        // Firebase Auth 초기화
        const initAuth = async () => {
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                await signInWithCustomToken(auth, __initial_auth_token);
            } else {
                await signInAnonymously(auth);
            }
        };
        
        initAuth();
        onAuthStateChanged(auth, (user) => {
            if (user) {
                processViews(user);
            }
        });
    </script>
</body>
</html>
